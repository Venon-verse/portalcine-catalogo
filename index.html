<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortalCine Catálogo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 15px;
            background-color: #1c1c1c;
            text-align: center;
            border-bottom: 2px solid #e50914; /* Destaque em vermelho estilo Netflix */
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        .categorias {
            display: flex;
            gap: 15px;
            padding: 15px;
            overflow-x: auto;
            width: 100%;
            justify-content: center;
        }
        .categoria-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .categoria-btn.ativo {
            background-color: #e50914;
        }
        .filmes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 filmes por linha */
            gap: 15px;
            padding: 15px;
            width: 90%;
            max-width: 400px;
        }
        .filme-card {
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 10px;
        }
        .filme-card img {
            width: 100%;
            height: auto;
        }
        .filme-titulo {
            margin: 10px 0 5px;
            font-size: 14px;
        }
        .comprar-btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 80%;
        }
    </style>
</head>
<body>

    <header>
        <h1>PortalCine</h1>
    </header>

    <div class="categorias">
        <button class="categoria-btn ativo">Ação</button>
        <button class="categoria-btn">Romance</button>
        <button class="categoria-btn">Dorama</button>
    </div>

    <div class="filmes-grid">
        <div class="filme-card">
            <img src="https://via.placeholder.com/150x220/333/fff?text=Capa+Filme+1" alt="Filme 1">
            <h3 class="filme-titulo">Filme de Ação</h3>
            <button class="comprar-btn">R$ 5,00</button>
        </div>
         <div class="filme-card">
            <img src="https://via.placeholder.com/150x220/333/fff?text=Capa+Filme+2" alt="Filme 2">
            <h3 class="filme-titulo">Outro Filme</h3>
            <button class="comprar-btn">R$ 5,00</button>
        </div>
    </div>

    <script>
        // Inicializa o Web App do Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Faz o app abrir ocupando mais espaço na tela
    </script>
</body>
</html>
